# ===== 新浪财经实时行情采集器配置 =====
# 复制为 config.yaml 后修改

# 采集标的列表
# 前缀规则: sh=上交所, sz=深交所, bj=北交所
symbols:
  - sh000001    # 上证指数
  - bj920576    # 天力复合
  # - sz000001  # 平安银行
  # - sh600519  # 贵州茅台

# 采集参数
crawl:
  poll_interval: 3          # 轮询间隔（秒），最低建议 1
  test_duration: 0          # 测试时长（秒），0=无限运行
  batch_commit_size: 20     # 每 N 条 DWD 行提交一次事务
  batch_commit_interval: 10 # 或每 M 秒提交一次（先到者触发）

# HTTP 请求配置
http:
  api_url: "https://hq.sinajs.cn/rn={ts}&list={symbols}"
  timeout: 10               # 单次请求超时（秒）
  max_retries: 3            # 最大重试次数（0=不重试）
  retry_base_delay: 1.0     # 重试基础延迟（秒），按 2^n 指数退避
  retry_max_delay: 30.0     # 最大重试延迟（秒）
  headers:
    Referer: "https://finance.sina.com.cn/"   # 必需，否则被拒绝
    User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

# 并发配置
# auto 模式: 标的数 < auto_threshold 时单线程，>= 时自动启用多线程
# true 模式: 始终多线程
# false 模式: 始终单线程
concurrency:
  enabled: auto
  max_workers: 4            # 最大线程数
  auto_threshold: 6         # auto 模式阈值
  batch_size: 4             # 每线程每轮处理的标的数

# 数据库配置
database:
  path: "hq_data.db"        # SQLite 文件路径
  wal_mode: true            # WAL 日志模式（推荐开启）
  cache_size: -4000         # 缓存大小（负值=KB，-4000=4MB）
  busy_timeout: 5000        # 锁等待超时（毫秒）

# 日志配置
logging:
  level: INFO               # DEBUG / INFO / WARNING / ERROR
  file: "logs/crawler.log"  # 日志文件路径
  max_bytes: 10485760       # 单文件最大 10MB
  backup_count: 5           # 保留 5 个轮转文件
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

# 监控告警配置
monitor:
  enabled: true
  latency_warn_ms: 500      # 延迟告警阈值（毫秒）
  latency_critical_ms: 2000 # 延迟严重告警阈值（毫秒）
  gap_threshold_seconds: 15  # 断流检测阈值（秒）
  price_spike_pct: 3.0      # 价格异常涨跌幅阈值（%）
  alert_to: console         # 告警输出: console / file / both
  alert_file: "logs/alerts.log"

# 数据保留策略
retention:
  ods_days: 7               # ODS 原始数据保留天数
  dwd_days: 90              # DWD 清洗数据保留天数
  dws_days: 365             # DWS 聚合数据保留天数
  compress_on_cleanup: true # 清理时对 ODS 做 gzip 归档
  archive_dir: "archives/"  # 归档文件目录

# ===== 交易时间段（守护进程模式） =====
# 混合模式：全局默认时段 + 个别 symbol 级覆盖
sessions:
  default:                  # 所有标的的默认交易时段
    - start: "09:30"
      end: "11:30"
    - start: "13:00"
      end: "15:00"
  # 个别标的可覆盖默认时段（可选）
  # overrides:
  #   sh000001:             # 上证指数：盘前盘后各多 15 分钟
  #     - start: "09:15"
  #       end: "15:15"

# ===== 守护进程配置 =====
daemon:
  pid_file: "logs/crawler.pid"  # PID 文件路径
  health:
    enabled: true               # 启用 HTTP 健康检查
    host: "127.0.0.1"           # 仅本地监听
    port: 8089                  # 端口（被占用时自动回退文件模式）
  hot_reload:
    enabled: true               # 启用配置热加载
    watch_file: "config.yaml"   # 监听的配置文件
  post_market_report:
    enabled: true               # 盘后自动生成报告
    output_dir: "reports/"      # 报告输出目录
    auto_cleanup: true          # 报告后自动执行数据清理
  auto_restart:
    enabled: true               # 采集异常时自动重启
    max_retries: 5              # 单日最大重启次数
    retry_delay: 10             # 重启间隔（秒）

# 市场数据（节点行情 + 行业/概念分类）
market_data:
  enabled: false                   # 是否启用节点数据采集
  nodes:                           # 采集的节点列表
    - hs_a                         # 沪深A股（全部）
    # - sz_a                       # 深市A股
    # - bjs_root                   # 北交所
    # - kcb                        # 科创板
    # - cyb                        # 创业板
  concept_nodes: []                # 概念板块节点（如 gn_hwqc, gn_BCdc）